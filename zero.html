<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ConQuizta – Rezultat</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@400;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at top, #3b2a1a 0%, #1a0e05 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Lato', sans-serif;
      color: #f0e0c0;
      padding: 16px;
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: 1.6rem;
      letter-spacing: 3px;
      color: #f5c97a;
      margin-bottom: 20px;
      text-shadow: 0 2px 8px #000a;
    }

    #card {
      background: linear-gradient(160deg, #3d2510 0%, #2a1608 100%);
      border: 2px solid #7a4e22;
      border-radius: 16px;
      box-shadow: 0 8px 32px #0008, inset 0 1px 0 #c8903340;
      width: 100%;
      max-width: 420px;
      padding: 28px 24px 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    /* ---- progress bar ---- */
    #progress-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.8rem;
      color: #c8a070;
    }
    #progress-bar-bg {
      flex: 1;
      height: 6px;
      background: #1a0e05;
      border-radius: 3px;
      overflow: hidden;
      border: 1px solid #7a4e2240;
    }
    #progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #c87030, #f5c97a);
      border-radius: 3px;
      width: 100%;
    }

    /* ---- scoreboard ---- */
    #score-bar {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: #a07848;
      padding: 0 4px;
    }
    #score-bar span { color: #f5c97a; font-weight: 700; }

    /* ---- final screen ---- */
    #final-screen {
      display: flex;
      flex-direction: column;
      gap: 16px;
      text-align: center;
    }
    #final-screen h2 {
      font-family: 'Cinzel', serif;
      color: #f5c97a;
      font-size: 1.4rem;
    }
    #final-stats {
      font-size: 0.95rem;
      line-height: 1.8;
      color: #d0c090;
    }
    #restart-btn {
      background: linear-gradient(160deg, #c87030, #7a4010);
      border: 2px solid #f5c97a60;
      border-radius: 8px;
      color: #f5e8c0;
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      padding: 12px;
      cursor: pointer;
      transition: filter 0.15s;
      text-decoration: none;
      display: inline-block;
    }
    #restart-btn:hover { filter: brightness(1.25); }
  </style>
</head>
<body>
  <h1>ConQuizta</h1>

  <div id="card">

    <!-- progress -->
    <div id="progress-wrap">
      <span id="progress-label">10 / 10</span>
      <div id="progress-bar-bg"><div id="progress-bar"></div></div>
    </div>

    <!-- score bar -->
    <div id="score-bar">
      Corecte: <span id="score-correct">10</span> &nbsp;|&nbsp;
      Greșite: <span id="score-wrong">0</span> &nbsp;|&nbsp;
      Total: <span id="score-total">10</span>
    </div>

    <!-- final -->
    <div id="final-screen">
      <h2>🏆 Terminat!</h2>
      <div id="final-stats">
        Răspunsuri corecte: <strong>10 / 10</strong> (100%)<br>
        Răspunsuri greșite: <strong>0</strong><br>
        Timp total: <strong>0,00 sec</strong><br>
        Timp mediu / întrebare: <strong>0,00 sec</strong>
      </div>
      <a href="index.html" id="restart-btn">Reîncepe</a>
    </div>

  </div>
</body>
</html>
